services:
  library-backend:
    image: ghcr.io/sadid205/library-backend:latest
    container_name: library_backend_prod
    ports:
      - "5000:5000"
    env_file:
      - ./.env.production
    depends_on:
      library-mongodb:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network

    deploy:
      resources:
        limits:
          memory: 800M
        reservations:
          memory: 300M

  library-frontend:
    image: ghcr.io/sadid205/library-frontend:latest
    container_name: library_frontend_prod
    ports:
      - "4175:4173"
    env_file:
      - ./.env.production
    depends_on:
      - library-backend
    restart: unless-stopped
    networks:
      - app-network

    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 400M

  library-mongodb:
    image: mongo:7
    container_name: library_mongodb_prod
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    env_file:
      - ./.env.production
    restart: unless-stopped
    networks:
      - app-network

    deploy:
      resources:
        limits:
          memory: 600M
        reservations:
          memory: 200M

volumes:
  mongo_data:

networks:
  app-network:
    driver: bridge
